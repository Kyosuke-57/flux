name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit --pretty 2>&1 | head -20; test ${PIPESTATUS[0]} -eq 0

  export:
    name: Expo Export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Expo Export
        run: npx expo export

  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install flux-api dependencies
        working-directory: apps/flux-api
        run: npm ci --legacy-peer-deps

      - name: Run tests (root)
        run: npm test

      - name: Run tests (flux-api)
        working-directory: apps/flux-api
        run: npm test
